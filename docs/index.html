<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>榊収穫管理</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="card__hd">
        <h2>収穫記録</h2>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <div id="demoBanner" class="demoBanner" hidden></div>

      <form id="form" class="form" autocomplete="off">
        <div class="row">
          <div class="field">
            <label for="date">日付</label>
            <input id="date" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="field">圃場</label>
            <select id="field" name="field" class="choiceSelect" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3上">3上</option>
              <option value="3下">3下</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="grade">規格</label>
            <select id="grade" name="grade" class="choiceSelect" required>
              <option value="40センチ">40センチ</option>
              <option value="45センチ">45センチ</option>
              <option value="大枝">大枝</option>
            </select>
          </div>
          <div class="field">
            <label for="user">入力者</label>
            <select id="user" name="user" class="choiceSelect" required>
              <option value="河合">河合</option>
              <option value="担当者">担当者</option>
            </select>
            <div class="mini">
              <button class="link" id="btnRenameOther" type="button">「担当者」の名称変更</button>
            </div>
          </div>
        </div>

        <details class="ocrToggle" id="ocrToggle">
          <summary class="ocrToggle__summary">カメラで重量を読む</summary>
          <div class="ocrPanel" aria-live="polite">
            <div class="field">
              <label for="ocrImage">写真を選択 / 撮影</label>
              <input id="ocrImage" type="file" accept="image/*" capture="environment" />
            </div>
            <div class="ocrPanel__preview">
              <img id="ocrPreview" alt="OCRプレビュー" />
            </div>
            <div class="ocrPanel__meta">
              <div id="ocrStatus" class="hint">未読み取り</div>
              <div class="actions">
                <button class="btn btn--ghost" id="btnOcrRead" type="button">写真から重量を読み取る</button>
                <button class="btn btn--ghost" id="btnOcrApply" type="button">この重量を追加する</button>
              </div>
            </div>
            <div class="ocrPanel__results">
              <div class="labelRow">
                <label>読み取った重量候補</label>
                <button class="btn btn--ghost btn--sm" id="btnOcrClear" type="button">候補クリア</button>
              </div>
              <div id="ocrCandidates" class="ocrCandidates"></div>
            </div>
          </div>
        </details>

        <div class="field">
          <label>重量一覧（kg）</label>
          <div id="weights" class="weights"></div>
          <div class="weightFooter">
            <div class="total">
              <div class="total__label">合計重量</div>
              <div class="total__value"><span id="totalWeight">0.0</span> kg</div>
            </div>
            <button class="btn btn--ghost btn--addWeight" id="btnAddWeight" type="button">＋重量を追加</button>
          </div>
        </div>

        <div class="field">
          <label for="memo">メモ</label>
          <textarea id="memo" name="memo" rows="2" placeholder="例: 葉が小さめ"></textarea>
        </div>

        <div class="actions">
          <button class="btn btn--primary btn--save" type="submit">保存する</button>
          <button class="btn btn--secondary" type="reset">入力をリセット</button>
          <button class="btn btn--ghost" id="btnSettings" type="button">設定</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="card__hd">
        <h2>ログ一覧</h2>
        <div class="hint"><span id="logSource" class="devOnly">この端末に保存中</span></div>
      </div>
      <div class="listTools">
        <button class="btn btn--ghost btn--sm" id="btnShowAll" type="button">すべてのログを表示</button>
      </div>
      <div id="list" class="list" aria-label="収穫ログ一覧"></div>
      <div class="summary" id="summary"></div>
    </section>

    <section class="card card--danger" id="manageSection">
      <div class="card__hd">
        <h2>管理・設定</h2>
        <div class="hint">必要なときだけ開いてください</div>
      </div>
      <div class="manageLaunchers">
        <button class="btn btn--ghost" id="btnSearchToggle" type="button">ログを探す</button>
        <button class="btn" id="btnManageToggle" type="button">管理</button>
      </div>
      <div id="status" class="statusInfo">データ状況</div>
      <div id="searchPanel" class="toolbarPanel toolbarPanel--search" hidden>
        <div class="field">
          <label for="month">月</label>
          <input id="month" type="month" />
        </div>
        <div class="field">
          <label for="q">検索</label>
          <input id="q" type="search" placeholder="圃場・規格・入力者・メモで検索" />
        </div>
      </div>
      <div id="managePanel" class="toolbarPanel toolbarPanel--menu" hidden>
        <button class="btn" id="btnFetch" type="button">最新データを読み込む</button>
        <button class="btn" id="btnExportCsv" type="button">Excel用に出力</button>
        <button class="btn" id="btnExportJson" type="button">バックアップを作成</button>
        <label class="btn btn--ghost" for="fileImport">バックアップを復元</label>
        <button class="btn btn--danger" id="btnClearTests" type="button" disabled>テストデータ削除（一時停止中）</button>
        <div class="hint">※アグリノート取込データを残す安全化対応中です</div>
        <input id="fileImport" class="sr-only" type="file" accept="application/json" />
      </div>
      <div class="dangerZone">
        <div class="dangerZone__title">危険な操作</div>
        <button class="btn btn--danger" id="btnClear" type="button">端末内データをすべて削除</button>
      </div>
    </section>
  </main>

  <dialog id="dlgEdit" class="dialog">
    <form method="dialog" class="dialog__panel" id="editForm">
      <div class="dialog__hd">
        <h3>編集（localStorage）</h3>
        <button class="iconBtn" value="cancel" aria-label="閉じる" type="submit">×</button>
      </div>

      <div class="dialog__bd">
        <div class="row">
          <div class="field">
            <label for="eDate">日付</label>
            <input id="eDate" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="eField">圃場</label>
            <select id="eField" name="field" class="choiceSelect" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3上">3上</option>
              <option value="3下">3下</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="eGrade">規格</label>
            <select id="eGrade" name="grade" class="choiceSelect" required>
              <option value="40センチ">40センチ</option>
              <option value="45センチ">45センチ</option>
              <option value="大枝">大枝</option>
            </select>
          </div>
          <div class="field">
            <label for="eUser">入力者</label>
            <select id="eUser" name="user" class="choiceSelect" required>
              <option value="河合">河合</option>
              <option value="担当者">担当者</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>重量一覧（kg）</label>
          <div id="eWeights" class="weights"></div>
          <div class="weightFooter">
            <div class="total">
              <div class="total__label">合計重量</div>
              <div class="total__value"><span id="eTotalWeight">0.0</span> kg</div>
            </div>
            <button class="btn btn--ghost btn--addWeight" id="btnEAddWeight" type="button">＋重量を追加</button>
          </div>
        </div>

        <div class="field">
          <label for="eMemo">メモ</label>
          <textarea id="eMemo" name="memo" rows="2"></textarea>
        </div>
      </div>

      <div class="dialog__ft">
        <button class="btn" value="cancel" type="submit">キャンセル</button>
        <button class="btn btn--primary" id="btnEditSave" value="ok" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlgSettings" class="dialog">
    <form method="dialog" class="dialog__panel" id="settingsForm">
      <div class="dialog__hd">
        <h3>設定</h3>
        <button class="iconBtn" value="cancel" aria-label="閉じる" type="submit">×</button>
      </div>
      <div class="dialog__bd">
        <div class="field">
          <label for="endpoint">Apps Script WebアプリURL（任意）</label>
          <input id="endpoint" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
          <div class="hint">未入力の場合は JavaScript内の `GAS_ENDPOINT` を使用します。</div>
        </div>
      </div>
      <div class="dialog__ft">
        <button class="btn" value="cancel" type="submit">閉じる</button>
        <button class="btn btn--primary" value="ok" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
