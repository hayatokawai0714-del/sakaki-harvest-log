<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f2a1d" />
  <title>榊 収穫ログ</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <div class="brand__title">榊 収穫ログ</div>
        <div class="brand__sub" id="status">localStorage</div>
      </div>
      <div class="topbar__actions">
        <button class="btn" id="btnExportCsv" type="button">CSV出力</button>
        <button class="btn" id="btnExportJson" type="button">JSON出力</button>
        <label class="btn btn--ghost" for="fileImport">JSON取込</label>
        <input id="fileImport" class="sr-only" type="file" accept="application/json" />
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="card__hd">
        <h2>新規記録</h2>
        <div class="muted">必須: 日付 / 数量</div>
      </div>
      <form id="form" class="grid" autocomplete="off">
        <div class="field">
          <label for="date">日付</label>
          <input id="date" name="date" type="date" required />
        </div>
        <div class="field">
          <label for="place">場所</label>
          <input id="place" name="place" type="text" placeholder="例: 畑A" maxlength="60" />
        </div>
        <div class="field">
          <label for="qty">数量</label>
          <input id="qty" name="qty" type="number" inputmode="decimal" step="0.01" min="0" required />
        </div>
        <div class="field">
          <label for="unit">単位</label>
          <select id="unit" name="unit">
            <option value="束">束</option>
            <option value="本">本</option>
            <option value="kg">kg</option>
            <option value="箱">箱</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field field--wide">
          <label for="note">メモ</label>
          <input id="note" name="note" type="text" placeholder="例: 形が良い" maxlength="120" />
        </div>
        <div class="actions">
          <button class="btn btn--primary" id="btnSave" type="submit">追加</button>
          <button class="btn btn--ghost" id="btnReset" type="reset">リセット</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="card__hd">
        <h2>一覧・集計</h2>
        <div class="filters">
          <div class="field">
            <label for="month">月</label>
            <input id="month" type="month" />
          </div>
          <div class="field">
            <label for="q">検索</label>
            <input id="q" type="search" placeholder="場所/メモ" />
          </div>
        </div>
      </div>

      <div class="summary" id="summary"></div>

      <div class="tableWrap">
        <table class="table" aria-label="収穫記録一覧">
          <thead>
            <tr>
              <th>日付</th>
              <th>場所</th>
              <th class="num">数量</th>
              <th>単位</th>
              <th>メモ</th>
              <th class="actionsCol">操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="card card--danger">
      <div class="card__hd">
        <h2>危険操作</h2>
        <div class="muted">取り消しできません</div>
      </div>
      <div class="actions">
        <button class="btn btn--danger" id="btnClear" type="button">全データ削除</button>
      </div>
    </section>
  </main>

  <dialog id="dlgEdit" class="dialog">
    <form method="dialog" class="dialog__panel" id="editForm">
      <div class="dialog__hd">
        <h3>編集</h3>
        <button class="iconBtn" value="cancel" aria-label="閉じる" type="submit">×</button>
      </div>
      <div class="grid">
        <div class="field">
          <label for="eDate">日付</label>
          <input id="eDate" name="date" type="date" required />
        </div>
        <div class="field">
          <label for="ePlace">場所</label>
          <input id="ePlace" name="place" type="text" maxlength="60" />
        </div>
        <div class="field">
          <label for="eQty">数量</label>
          <input id="eQty" name="qty" type="number" inputmode="decimal" step="0.01" min="0" required />
        </div>
        <div class="field">
          <label for="eUnit">単位</label>
          <select id="eUnit" name="unit">
            <option value="束">束</option>
            <option value="本">本</option>
            <option value="kg">kg</option>
            <option value="箱">箱</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="field field--wide">
          <label for="eNote">メモ</label>
          <input id="eNote" name="note" type="text" maxlength="120" />
        </div>
      </div>
      <div class="dialog__ft">
        <button class="btn" value="cancel" type="submit">キャンセル</button>
        <button class="btn btn--primary" id="btnEditSave" value="ok" type="submit">保存</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
